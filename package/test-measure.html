<!DOCTYPE html>
<html>
<head>
<style>
  .host {
    position: fixed;
    bottom: 50px;
    left: 50px;
    background: #1c1c1c;
    border-radius: 16px;
    overflow: hidden;
    transition: width 300ms ease, height 300ms ease;
    display: grid;
    grid-template-areas: "stack";
  }
  .child {
    grid-area: stack;
    width: max-content;
    height: max-content;
  }
</style>
</head>
<body>
  <div class="host" id="host" style="width: 200px; height: 100px;">
    <div class="child" id="child1" style="width: 200px; height: 100px; background: red;">Child 1</div>
  </div>
  <script>
    // Just simulating
  </script>
</body>
</html>
